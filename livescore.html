<!DOCTYPE html>
<html>
<head>
<title>Live Cricket Score</title>
<style>
body {
  background: transparent;
  color: white;
  font-family: Arial;
}
.scoreboard {
  background: #111;
  padding: 20px;
  border-radius: 10px;
  width: 400px;
}
h2 {
  margin: 0;
}
</style>
</head>
<body>

<div class="scoreboard">
  <h2 id="match">Loading...</h2>
  <p id="score"></p>
  <p id="status"></p>
</div>

<script>
const apiKey = "https://api.cricapi.com/v1/series?apikey=[your api key]&offset=0";

async function fetchScore() {
  const response = await fetch(`https://api.cricapi.com/v1/currentMatches?apikey=${apiKey}`);
  const data = await response.json();

  if(data.data && data.data.length > 0) {
    const match = data.data[0];
    document.getElementById("match").innerText = match.name;
    document.getElementById("score").innerText = match.score ? match.score[0].r + "/" + match.score[0].w + " (" + match.score[0].o + ")" : "Score not available";
    document.getElementById("status").innerText = match.status;
  }
}

fetchScore();
setInterval(fetchScore, 15000);
</script>

</body>
</html>
